name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run api:prisma:generate

      - name: Typecheck API
        run: npm run api:typecheck

      - name: Typecheck Web
        run: npm run web:typecheck

      - name: Build API
        run: npm run api:build

      - name: Build Web
        run: npm run web:build
