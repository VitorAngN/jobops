services:
  postgres:
    image: postgres:16-alpine
    container_name: jobops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobops
      POSTGRES_PASSWORD: jobops
      POSTGRES_DB: jobops
    ports:
      - "5432:5432"
    volumes:
      - jobops_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobops -d jobops"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  jobops_postgres_data:

